<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-vend-32.png">
  <title>Locations — Kande VendTech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f5f5f7; --card: #ffffff; --border: #e2e8f0; --text: #1a202c;
      --muted: #718096; --accent: #3182ce; --success: #38a169; --warn: #dd6b20;
      --hot: #e53e3e; --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { max-width: 1100px; margin: 0 auto; padding: 24px 20px 40px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-size: 1.6rem; font-weight: 700; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Stats row */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
    .stat-card .val { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
    .stat-card .lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

    /* Location cards */
    .location-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
    .loc-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .loc-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 3px; }
    .loc-address { font-size: 0.83rem; color: var(--muted); }
    .loc-status { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; }
    .status-active    { background: rgba(56,161,105,.12); color: var(--success); }
    .status-pending   { background: rgba(221,107,32,.12); color: var(--warn); }
    .status-transit   { background: rgba(49,130,206,.12); color: var(--accent); }
    .status-inactive  { background: #edf2f7; color: var(--muted); }
    .loc-meta { font-size: 0.8rem; color: var(--muted); margin-top: 6px; display: flex; gap: 14px; flex-wrap: wrap; }
    .loc-meta a { color: var(--accent); text-decoration: none; }

    /* Machine rows inside location */
    .machines-section { padding: 0; }
    .machine-row { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .machine-row:last-child { border-bottom: none; }
    .machine-icon { width: 40px; height: 40px; border-radius: 10px; background: #edf2f7; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .machine-info { flex: 1; min-width: 0; }
    .machine-name { font-weight: 600; font-size: 0.9rem; }
    .machine-model { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .machine-badges { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; }
    .badge-online  { background: rgba(56,161,105,.12); color: var(--success); }
    .badge-offline { background: rgba(229,62,62,.12); color: var(--hot); }
    .badge-transit { background: rgba(49,130,206,.12); color: var(--accent); }
    .badge-pending { background: rgba(221,107,32,.12); color: var(--warn); }
    .machine-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .icon-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; text-decoration: none; color: var(--text); }
    .icon-btn:hover { background: #f0f4f8; }

    /* Contract chip */
    .contract-chip { font-size: 0.73rem; color: var(--muted); background: #f7fafc; border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; }

    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }
  </style>
</head>
<body>
  <script src="/nav.js"></script>
  <div class="app">
    <div class="page-header">
      <h1>📍 Locations</h1>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="openAddLocation()">+ Add Location</button>
      </div>
    </div>

    <div class="stats" id="statsRow">
      <div class="stat-card"><div class="val" id="statLocations">—</div><div class="lbl">Locations</div></div>
      <div class="stat-card"><div class="val" id="statMachines">—</div><div class="lbl">Machines</div></div>
      <div class="stat-card"><div class="val" id="statOnline">—</div><div class="lbl">Online</div></div>
      <div class="stat-card"><div class="val" id="statRevShare">—</div><div class="lbl">Rev Share Active</div></div>
    </div>

    <div id="locationsList">
      <div class="empty"><div class="icon">⏳</div>Loading...</div>
    </div>
  </div>

  <script>
  const SANDSTAR_IDS = {
    'CVM13': 128010, 'ARK 28': 128002, 'VRK C-3276': 127763, 'VRK C-1021': 127761,
  };

  function sandstarUrl(machine) {
    if (machine.sandstar_id) return `https://prod-ops-us.sandstar.com/#/pages/freezer/detail?freezerId=${machine.sandstar_id}`;
    for (const [k, id] of Object.entries(SANDSTAR_IDS)) {
      if ((machine.name||'').includes(k) || (machine.model||'').includes(k)) {
        return `https://prod-ops-us.sandstar.com/#/pages/freezer/detail?freezerId=${id}`;
      }
    }
    return null;
  }

  function machineEmoji(model) {
    if (!model) return '🏪';
    const m = model.toLowerCase();
    if (m.includes('freezer')) return '🧊';
    if (m.includes('vrk') || m.includes('sandstar')) return '🤖';
    if (m.includes('cvm')) return '🏪';
    if (m.includes('taste')) return '🥤';
    return '🏪';
  }

  function statusLabel(status) {
    const map = { active: 'Active', online: 'Online', offline: 'Offline', in_transit: 'In Transit',
                  pending_install: 'Pending Install', inactive: 'Inactive' };
    return map[status] || status || '—';
  }

  function locationStatusClass(status) {
    if (status === 'active' || status === 'online') return 'status-active';
    if (status === 'in_transit' || status === 'pending_install') return 'status-transit';
    if (status === 'inactive') return 'status-inactive';
    return 'status-pending';
  }

  function machineBadgeClass(status) {
    if (status === 'active' || status === 'online') return 'badge-online';
    if (status === 'offline') return 'badge-offline';
    if (status === 'in_transit') return 'badge-transit';
    return 'badge-pending';
  }

  async function load() {
    const res = await fetch('/api/machines');
    const machines = await res.json();

    // Group by location
    const locMap = {};
    for (const m of machines) {
      const loc = m.location || { id: m.id + '_noloc', name: 'Unknown Location', address: '' };
      const key = loc.id || (m.id + '_noloc');
      if (!locMap[key]) locMap[key] = { loc, machines: [] };
      locMap[key].machines.push(m);
    }

    const groups = Object.values(locMap);
    const totalOnline = machines.filter(m => m.status === 'active' || m.status === 'online' || m.sandstar_status === 'online').length;
    const revShareCount = groups.filter(g => g.loc.notes && g.loc.notes.toLowerCase().includes('rev share')).length;

    document.getElementById('statLocations').textContent = groups.length;
    document.getElementById('statMachines').textContent = machines.length;
    document.getElementById('statOnline').textContent = totalOnline;
    document.getElementById('statRevShare').textContent = revShareCount;

    if (groups.length === 0) {
      document.getElementById('locationsList').innerHTML = '<div class="empty"><div class="icon">📍</div><p>No locations yet.</p></div>';
      return;
    }

    document.getElementById('locationsList').innerHTML = groups.map(({ loc, machines: ms }) => {
      const contractStart = loc.contract_start ? new Date(loc.contract_start).toLocaleDateString('en-US', {month:'short', year:'numeric'}) : null;
      const mapsUrl = loc.address ? `https://maps.google.com/?q=${encodeURIComponent(loc.address)}` : null;

      const machineRows = ms.map(m => {
        const ssUrl = sandstarUrl(m);
        return `
          <div class="machine-row">
            <div class="machine-icon">${machineEmoji(m.model)}</div>
            <div class="machine-info">
              <div class="machine-name">${m.name || m.model || 'Machine'}</div>
              <div class="machine-model">${m.model || ''}${m.serial_number ? ' · S/N ' + m.serial_number : ''}</div>
              <div class="machine-badges">
                <span class="badge ${machineBadgeClass(m.status)}">${statusLabel(m.status)}</span>
                ${m.model ? `<span class="contract-chip">${m.model}</span>` : ''}
              </div>
            </div>
            <div class="machine-actions">
              ${ssUrl ? `<a class="icon-btn" href="${ssUrl}" target="_blank" title="View in Sandstar">⚡</a>` : ''}
              <button class="icon-btn" onclick="editMachine(${m.id})" title="Edit">✏️</button>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="location-card">
          <div class="loc-header">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                <div class="loc-name">${loc.name}</div>
                <span class="loc-status ${locationStatusClass(loc.status)}">${statusLabel(loc.status)}</span>
              </div>
              ${loc.address ? `<div class="loc-address">${loc.address}</div>` : ''}
              <div class="loc-meta">
                ${ms.length} machine${ms.length !== 1 ? 's' : ''}
                ${contractStart ? `· Contract started ${contractStart}` : ''}
                ${mapsUrl ? `· <a href="${mapsUrl}" target="_blank">📍 Directions</a>` : ''}
                ${loc.phone ? `· <a href="tel:${loc.phone}">${loc.phone}</a>` : ''}
              </div>
            </div>
          </div>
          <div class="machines-section">
            ${machineRows}
          </div>
        </div>`;
    }).join('');
  }

  function editMachine(id) {
    window.location.href = `/machines/${id}`;
  }

  function openAddLocation() {
    alert('Add location via CRM — link a prospect and add a machine to their account.');
  }

  load();
  </script>
</body>
</html>
