<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-vend-32.png">
  <title>Locations — Kande VendTech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f5f5f7; --card: #ffffff; --border: #e2e8f0; --text: #1a202c;
      --muted: #718096; --accent: #3182ce; --success: #38a169; --warn: #dd6b20;
      --hot: #e53e3e; --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { max-width: 1200px; margin: 0 auto; padding: 24px 20px 40px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .stat-card .val { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
    .stat-card .lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* Main table */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #edf2f7; }
    thead th { padding: 9px 14px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); font-weight: 700; text-align: left; white-space: nowrap; }
    tbody tr { border-top: 1px solid var(--border); }
    tbody tr:hover td { background: #fafbfc; }

    /* Location row */
    tr.loc-row td { padding: 10px 14px; font-size: 0.85rem; font-weight: 600; background: #f8fafc; }
    tr.loc-row td:first-child { font-size: 0.88rem; }

    /* Machine row */
    tr.machine-row td { padding: 8px 14px; font-size: 0.82rem; }
    tr.machine-row td:first-child { padding-left: 30px; color: var(--muted); font-weight: 500; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; }
    .badge-online  { background: rgba(56,161,105,.12); color: var(--success); }
    .badge-offline { background: rgba(229,62,62,.12); color: var(--hot); }
    .badge-transit { background: rgba(49,130,206,.12); color: var(--accent); }
    .badge-pending { background: rgba(221,107,32,.12); color: var(--warn); }
  </style>
</head>
<body>
  <script src="/nav.js"></script>
  <div class="app">
    <div class="page-header">
      <h1>📍 Locations</h1>
    </div>

    <div class="stats">
      <div class="stat-card"><div class="val" id="statLocations">—</div><div class="lbl">Locations</div></div>
      <div class="stat-card"><div class="val" id="statMachines">—</div><div class="lbl">Machines</div></div>
      <div class="stat-card"><div class="val" id="statOnline">—</div><div class="lbl">Online</div></div>
      <div class="stat-card"><div class="val" id="statPending">—</div><div class="lbl">Pending Install</div></div>
    </div>

    <div class="table-wrap">
      <table id="locTable">
        <thead>
          <tr>
            <th style="width:30%">Location / Machine</th>
            <th>Address</th>
            <th>Model</th>
            <th>Status</th>
            <th>Contract Start</th>
            <th>Phone</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" style="padding:40px;text-align:center;color:var(--muted)">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
  function statusLabel(s) {
    const map = { active:'Active', online:'Online', offline:'Offline', in_transit:'In Transit', pending_install:'Pending Install', inactive:'Inactive' };
    return map[s] || s || '—';
  }
  function badgeClass(s) {
    if (s === 'active' || s === 'online') return 'badge-online';
    if (s === 'offline') return 'badge-offline';
    if (s === 'in_transit') return 'badge-transit';
    return 'badge-pending';
  }

  async function load() {
    const res = await fetch('/api/machines');
    if (res.status === 401) { window.location.href = '/login?redirect=/locations'; return; }
    const machines = await res.json();

    // Group by location
    const locMap = {};
    for (const m of machines) {
      const loc = m.location || { id: m.id + '_noloc', name: 'Unknown', address: '', phone: '', contract_start: null, status: '' };
      const key = String(loc.id || loc.name);
      if (!locMap[key]) locMap[key] = { loc, machines: [] };
      locMap[key].machines.push(m);
    }
    const groups = Object.values(locMap);

    const totalOnline = machines.filter(m => m.status === 'active' || m.status === 'online').length;
    const totalPending = machines.filter(m => m.status === 'pending_install' || m.status === 'in_transit').length;
    document.getElementById('statLocations').textContent = groups.length;
    document.getElementById('statMachines').textContent = machines.length;
    document.getElementById('statOnline').textContent = totalOnline;
    document.getElementById('statPending').textContent = totalPending;

    let rows = '';
    groups.forEach(({ loc, machines: ms }) => {
      const contractDate = loc.contract_start
        ? new Date(loc.contract_start).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : '—';
      // Location row
      rows += `<tr class="loc-row">
        <td>${loc.name}</td>
        <td style="font-weight:400;color:var(--muted);font-size:0.8rem">${loc.address || '—'}</td>
        <td>—</td>
        <td><span class="badge ${badgeClass(loc.status)}">${statusLabel(loc.status)}</span></td>
        <td>${contractDate}</td>
        <td style="font-weight:400;font-size:0.8rem">${loc.phone || '—'}</td>
      </tr>`;
      // Machine rows
      ms.forEach(m => {
        rows += `<tr class="machine-row">
          <td>${m.name || m.model || 'Machine'}</td>
          <td>—</td>
          <td>${m.model || '—'}</td>
          <td><span class="badge ${badgeClass(m.status)}">${statusLabel(m.status)}</span></td>
          <td>—</td>
          <td>—</td>
        </tr>`;
      });
    });

    if (!rows) rows = '<tr><td colspan="6" style="padding:40px;text-align:center;color:var(--muted)">No locations found.</td></tr>';
    document.getElementById('tableBody').innerHTML = rows;
  }

  load();
  </script>
</body>
</html>
