<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-vend-32.png">
  <title>Locations — Kande VendTech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f5f5f7; --card: #ffffff; --border: #e2e8f0; --text: #1a202c;
      --muted: #718096; --accent: #3182ce; --success: #38a169; --warn: #dd6b20;
      --hot: #e53e3e; --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { max-width: 1300px; margin: 0 auto; padding: 24px 20px 60px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-sm { padding: 4px 10px; font-size: 0.75rem; }
    .btn-danger { background: var(--hot); color:#fff; border-color:var(--hot); }

    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .stat-card .val { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
    .stat-card .lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* Column header bar */
    .col-headers { display: grid; grid-template-columns: 1.8fr 1.4fr 0.9fr 1fr 1.2fr 1.4fr; background: #edf2f7; border: 1px solid var(--border); border-bottom: none; border-radius: var(--radius) var(--radius) 0 0; }
    .col-header { padding: 8px 14px; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); font-weight: 700; }

    /* Location block */
    .loc-block { background: var(--card); border: 1px solid var(--border); border-top: none; margin-bottom: 20px; }
    .loc-block:last-child { border-radius: 0 0 var(--radius) var(--radius); }

    /* Location header row */
    .loc-row { display: grid; grid-template-columns: 1.8fr 1.4fr 0.9fr 1fr 1.2fr 1.4fr; border-bottom: 1px solid var(--border); background: #f8fafc; }
    .loc-cell { padding: 10px 14px; font-size: 0.84rem; display: flex; align-items: center; }
    .loc-cell:not(:last-child) { border-right: 1px solid var(--border); }
    .loc-name { font-weight: 700; font-size: 0.88rem; }

    /* Inline editable cell */
    .editable { cursor: pointer; min-height: 20px; }
    .editable:hover { background: rgba(49,130,206,.06); border-radius: 4px; }
    .editable.editing { padding: 0; }
    .edit-input { width: 100%; padding: 5px 8px; border: 1px solid var(--accent); border-radius: 5px; font-size: 0.83rem; outline: none; background: var(--card); }

    /* Machine sub-table */
    .machines-table { border-bottom: 1px solid var(--border); }
    .machine-col-headers { display: grid; grid-template-columns: 2fr 1fr 1fr; background: #fafbfc; border-bottom: 1px solid var(--border); }
    .machine-col-header { padding: 5px 14px 5px 28px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-weight: 700; }
    .machine-col-header:first-child { border-right: 1px solid var(--border); }
    .machine-col-header:nth-child(2) { border-right: 1px solid var(--border); }
    .machine-row { display: grid; grid-template-columns: 2fr 1fr 1fr; border-top: 1px solid #f0f4f8; }
    .machine-cell { padding: 7px 14px; font-size: 0.8rem; color: var(--muted); }
    .machine-cell:first-child { padding-left: 28px; color: var(--text); font-weight: 500; border-right: 1px solid var(--border); }
    .machine-cell:nth-child(2) { border-right: 1px solid var(--border); }

    /* Contacts section */
    .contacts-section { padding: 10px 14px 12px; background: #fafbfc; }
    .contacts-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .contact-row { display: grid; grid-template-columns: 1.5fr 1fr 1.5fr 2fr auto; gap: 10px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
    .contact-row:last-of-type { border-bottom: none; }
    .no-contacts { font-size: 0.8rem; color: var(--muted); padding: 4px 0 6px; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--card); border-radius:14px; padding:24px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; }
    .modal h3 { font-size:1rem; margin-bottom:16px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-group { margin-bottom:12px; }
    .form-group label { display:block; font-size:0.78rem; font-weight:600; color:var(--muted); margin-bottom:4px; }
    .form-group input, .form-group textarea, .form-group select { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:7px; font-size:0.85rem; }
    .form-group textarea { min-height:60px; resize:vertical; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }

    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .badge { display:inline-block; padding:2px 8px; border-radius:5px; font-size:0.68rem; font-weight:700; }
    .badge-online  { background:rgba(56,161,105,.12); color:var(--success); }
    .badge-offline { background:rgba(229,62,62,.12); color:var(--hot); }
    .badge-transit { background:rgba(49,130,206,.12); color:var(--accent); }
    .badge-pending { background:rgba(221,107,32,.12); color:var(--warn); }
  </style>
</head>
<body>
  <script src="/nav.js"></script>
  <div class="app">
    <div class="page-header">
      <h1>📍 Locations</h1>
    </div>

    <div class="stats">
      <div class="stat-card"><div class="val" id="statLocations">—</div><div class="lbl">Locations</div></div>
      <div class="stat-card"><div class="val" id="statMachines">—</div><div class="lbl">Machines</div></div>
      <div class="stat-card"><div class="val" id="statOnline">—</div><div class="lbl">Online</div></div>
      <div class="stat-card"><div class="val" id="statPending">—</div><div class="lbl">Pending Install</div></div>
    </div>

    <div class="col-headers">
      <div class="col-header">Location</div>
      <div class="col-header">Address</div>
      <div class="col-header">Contract Start</div>
      <div class="col-header">Phone</div>
      <div class="col-header">Main Contact</div>
      <div class="col-header">Email</div>
    </div>

    <div id="locationsList"></div>
  </div>

  <!-- Add/Edit Contact Modal -->
  <div class="modal-overlay" id="contactModal">
    <div class="modal">
      <h3 id="contactModalTitle">Add Contact</h3>
      <input type="hidden" id="contactLocId">
      <input type="hidden" id="contactId">
      <div class="form-row">
        <div class="form-group"><label>Name *</label><input type="text" id="contactName" placeholder="Jane Smith"></div>
        <div class="form-group"><label>Title / Role</label><input type="text" id="contactTitle" placeholder="Property Manager"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Phone</label><input type="text" id="contactPhone" placeholder="702-555-0100"></div>
        <div class="form-group"><label>Email</label><input type="email" id="contactEmail" placeholder="jane@property.com"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Birthday</label><input type="date" id="contactBirthday"></div>
        <div class="form-group"><label>Favorite Snack / Food / Drink</label><input type="text" id="contactFavorite" placeholder="e.g. Diet Coke, Snickers"></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="contactNotes" placeholder="Best time to call, preferences, etc."></textarea></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeContactModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveContact()">Save Contact</button>
      </div>
    </div>
  </div>

  <script>
  let locationsData = [];
  let machinesData = [];

  function statusLabel(s) {
    const map = { active:'Active', online:'Online', offline:'Offline', in_transit:'In Transit', pending_install:'Pending Install', inactive:'Inactive' };
    return map[s] || s || '—';
  }
  function cleanMachineName(machineName, locationName) {
    if (!machineName) return '—';
    const parts = machineName.split(' - ');
    if (parts.length > 1) return parts.slice(1).join(' - ');
    return machineName;
  }

  async function load() {
    const [mRes, lRes] = await Promise.all([fetch('/api/machines'), fetch('/api/locations')]);
    if (mRes.status === 401) { window.location.href = '/login?redirect=/locations'; return; }
    machinesData = await mRes.json();
    const locs = await lRes.json();
    locationsData = Array.isArray(locs) ? locs : [];

    const locMap = {};
    for (const m of machinesData) {
      const loc = m.location || { id: m.id + '_noloc', name: 'Unknown', address: '', phone: '', contract_start: null, status: '' };
      const key = String(loc.id || loc.name);
      if (!locMap[key]) locMap[key] = { loc, machines: [] };
      locMap[key].machines.push(m);
    }
    const groups = Object.values(locMap);
    groups.forEach(g => {
      const full = locationsData.find(l => l.id === g.loc.id);
      if (full) { g.loc.contacts = full.contacts || []; g.loc.phone = full.phone; g.loc.contract_start = full.contract_start; }
    });

    const totalOnline = machinesData.filter(m => m.status === 'active' || m.status === 'online').length;
    const totalPending = machinesData.filter(m => m.status === 'pending_install' || m.status === 'in_transit').length;
    document.getElementById('statLocations').textContent = groups.length;
    document.getElementById('statMachines').textContent = machinesData.length;
    document.getElementById('statOnline').textContent = totalOnline;
    document.getElementById('statPending').textContent = totalPending;

    document.getElementById('locationsList').innerHTML = groups.map(({ loc, machines: ms }) => {
      const contractDate = loc.contract_start
        ? new Date(loc.contract_start).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
        : '—';
      const mainContact = (loc.contacts || [])[0] || null;
      const contacts = loc.contacts || [];

      const machineRows = ms.map(m => `
        <div class="machine-row">
          <div class="machine-cell">${cleanMachineName(m.name, loc.name)}</div>
          <div class="machine-cell">—</div>
          <div class="machine-cell">—</div>
        </div>`).join('');

      const contactRows = contacts.length === 0
        ? '<div class="no-contacts">No contacts yet.</div>'
        : contacts.map(c => `
          <div class="contact-row">
            <div><strong>${c.name || '—'}</strong>${c.title ? '<span style="color:var(--muted);margin-left:6px;font-size:0.75rem">' + c.title + '</span>' : ''}</div>
            <div>${c.phone ? '<a href="tel:' + c.phone + '">' + c.phone + '</a>' : '—'}</div>
            <div>${c.email ? '<a href="mailto:' + c.email + '">' + c.email + '</a>' : '—'}</div>
            <div style="color:var(--muted);font-size:0.78rem">${c.birthday ? '🎂 ' + new Date(c.birthday).toLocaleDateString('en-US',{month:'short',day:'numeric'}) + (c.favorite ? ' &nbsp;·&nbsp; 🍫 ' + c.favorite : '') : (c.favorite ? '🍫 ' + c.favorite : (c.notes || '—'))}</div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-sm" onclick="openEditContact(${loc.id}, ${c.id})">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteContact(${loc.id}, ${c.id})">✕</button>
            </div>
          </div>`).join('');

      return `
        <div class="loc-block" id="loc-${loc.id}">
          <div style="display:grid;grid-template-columns:1.8fr 1.4fr 0.9fr 1fr 1.2fr 1.4fr;background:#edf2f7;border-bottom:1px solid var(--border)">
            <div style="padding:5px 14px;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:700">Location</div>
            <div style="padding:5px 14px;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:700">Address</div>
            <div style="padding:5px 14px;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:700">Contract Start</div>
            <div style="padding:5px 14px;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:700">Phone</div>
            <div style="padding:5px 14px;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:700">Main Contact</div>
            <div style="padding:5px 14px;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:700">Email</div>
          </div>
          <div class="loc-row">
            <div class="loc-cell"><span class="loc-name">${loc.name}</span></div>
            <div class="loc-cell"><span class="editable" style="color:var(--muted);font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${loc.address || '—'}</span></div>
            <div class="loc-cell">
              <span class="editable" onclick="startEdit(this, ${loc.id}, 'contract_start', 'date')" title="Click to edit">${contractDate}</span>
            </div>
            <div class="loc-cell" style="white-space:nowrap">
              <span class="editable" onclick="startEdit(this, ${loc.id}, 'phone', 'text')" title="Click to edit">${loc.phone ? '<a href="tel:' + loc.phone + '" onclick="event.stopPropagation()">' + loc.phone + '</a>' : '<span style=\'color:var(--muted)\'>—</span>'}</span>
            </div>
            <div class="loc-cell">
              <span class="editable" onclick="startEditContact(this, ${loc.id}, 'name')" title="Click to edit">${mainContact ? mainContact.name : '<span style=\'color:var(--muted)\'>—</span>'}</span>
            </div>
            <div class="loc-cell">
              <span class="editable" onclick="startEditContact(this, ${loc.id}, 'email')" title="Click to edit">${mainContact && mainContact.email ? '<a href="mailto:' + mainContact.email + '" onclick="event.stopPropagation()">' + mainContact.email + '</a>' : '<span style=\'color:var(--muted)\'>—</span>'}</span>
            </div>
          </div>
          <div class="machines-table">
            <div class="machine-col-headers">
              <div class="machine-col-header">Machine</div>
              <div class="machine-col-header">% Full</div>
              <div class="machine-col-header">Last Restock</div>
            </div>
            ${machineRows}
          </div>
          <div class="contacts-section">
            <div class="contacts-label">
              <span>Contacts</span>
              <button class="btn btn-sm btn-primary" onclick="openAddContact(${loc.id})">+ Add Contact</button>
            </div>
            ${contactRows}
          </div>
        </div>`;
    }).join('') || '<div style="padding:40px;text-align:center;color:var(--muted)">No locations found.</div>';
  }

  // ===== INLINE FIELD EDITING =====
  function startEdit(span, locId, field, type) {
    if (span.querySelector('input')) return;
    const current = span.dataset.value ||
      (field === 'contract_start'
        ? (locationsData.find(l => l.id === locId)?.contract_start || '')
        : (locationsData.find(l => l.id === locId)?.[field] || ''));
    span.classList.add('editing');
    const input = document.createElement('input');
    input.type = type;
    input.value = current;
    input.className = 'edit-input';
    span.innerHTML = '';
    span.appendChild(input);
    input.focus();
    const save = async () => {
      const val = input.value.trim();
      const payload = {};
      payload[field] = val || null;
      const res = await fetch('/api/locations/' + locId, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      if (res.ok) { load(); } else { load(); }
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') load(); });
  }

  async function startEditContact(span, locId, field) {
    // Edit first contact's field inline
    const loc = locationsData.find(l => l.id === locId);
    const contact = (loc?.contacts || [])[0];
    if (!contact) { openAddContact(locId); return; }
    if (span.querySelector('input')) return;
    span.classList.add('editing');
    const input = document.createElement('input');
    input.type = field === 'email' ? 'email' : 'text';
    input.value = contact[field] || '';
    input.className = 'edit-input';
    span.innerHTML = '';
    span.appendChild(input);
    input.focus();
    const save = async () => {
      const payload = {};
      payload[field] = input.value.trim();
      await fetch('/api/locations/' + locId + '/contacts/' + contact.id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      load();
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') load(); });
  }

  // ===== CONTACT MODAL =====
  function openAddContact(locId) {
    document.getElementById('contactModalTitle').textContent = 'Add Contact';
    document.getElementById('contactLocId').value = locId;
    document.getElementById('contactId').value = '';
    ['contactName','contactTitle','contactPhone','contactEmail','contactNotes','contactFavorite'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('contactBirthday').value = '';
    document.getElementById('contactModal').classList.add('open');
  }

  function openEditContact(locId, contactId) {
    const loc = locationsData.find(l => l.id === locId);
    const c = (loc?.contacts || []).find(c => c.id === contactId);
    if (!c) return;
    document.getElementById('contactModalTitle').textContent = 'Edit Contact';
    document.getElementById('contactLocId').value = locId;
    document.getElementById('contactId').value = contactId;
    document.getElementById('contactName').value = c.name || '';
    document.getElementById('contactTitle').value = c.title || '';
    document.getElementById('contactPhone').value = c.phone || '';
    document.getElementById('contactEmail').value = c.email || '';
    document.getElementById('contactBirthday').value = c.birthday || '';
    document.getElementById('contactFavorite').value = c.favorite || '';
    document.getElementById('contactNotes').value = c.notes || '';
    document.getElementById('contactModal').classList.add('open');
  }

  function closeContactModal() { document.getElementById('contactModal').classList.remove('open'); }

  async function saveContact() {
    const locId = parseInt(document.getElementById('contactLocId').value);
    const contactId = document.getElementById('contactId').value;
    const body = {
      name:     document.getElementById('contactName').value.trim(),
      title:    document.getElementById('contactTitle').value.trim(),
      phone:    document.getElementById('contactPhone').value.trim(),
      email:    document.getElementById('contactEmail').value.trim(),
      birthday: document.getElementById('contactBirthday').value,
      favorite: document.getElementById('contactFavorite').value.trim(),
      notes:    document.getElementById('contactNotes').value.trim(),
    };
    if (!body.name) { alert('Name is required'); return; }
    const url = contactId ? '/api/locations/' + locId + '/contacts/' + contactId : '/api/locations/' + locId + '/contacts';
    const method = contactId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (res.ok) { closeContactModal(); load(); } else { alert('Failed to save'); }
  }

  async function deleteContact(locId, contactId) {
    if (!confirm('Remove this contact?')) return;
    await fetch('/api/locations/' + locId + '/contacts/' + contactId, { method: 'DELETE' });
    load();
  }

  document.getElementById('contactModal').addEventListener('click', e => {
    if (e.target === document.getElementById('contactModal')) closeContactModal();
  });

  load();
  </script>
</body>
</html>
